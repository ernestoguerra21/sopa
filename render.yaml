services:
  - type: web
    name: sopa-api
    runtime: node
    plan: free
    buildCommand: corepack enable && corepack prepare pnpm@9 --activate && pnpm install --no-frozen-lockfile && pnpm --filter @sopa/database generate && pnpm --filter api build
    startCommand: node apps/api/dist/apps/api/src/main.js
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_VERSION
        value: "22"
